# DSpace Local Configuration for Automation
# Copy this to your DSpace docker-compose directory

dspace.dir=/dspace
dspace.server.url = http://localhost:8081/server
dspace.server.ssr.url = http://localhost:8081/server
dspace.ui.url = http://localhost:4000
dspace.name = DSpace Demo

# Database connection (Docker network)
db.url = jdbc:postgresql://dspacedb:5432/dspace
db.driver = org.postgresql.Driver
db.dialect = org.dspace.storage.rdbms.hibernate.postgres.DSpacePostgreSQL82Dialect
db.username = dspace
db.password = dspace
db.schema = public

# Solr connection (Docker network)
solr.server = http://dspacesolr:8983/solr

# --- AUTOMATION SETTINGS ---
# Disable CSRF for Python script access
rest.csrf.enabled = false

# Allow connections from any origin (for local scripts)
rest.cors.allowed-origins = *

# Long-lived tokens (1 year) to avoid re-authentication
jwt.login.token.expiration.time = 31536000000
webui.user.assn.expiration = 31536000000

# Upload limits for large images
spring.servlet.multipart.max-file-size = 512MB
spring.servlet.multipart.max-request-size = 512MB
